<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>priPlane -- Shoot and fly</title>
	<style type="text/css">
		*
		{
			margin: 0;
			padding: 0;
			user-select: none;
		}
		body
		{
			height: 100vh;
			width: 100%;
			background: #000;
			overflow: hidden;
		}
		canvas
		{
			height: 100vh;
			width: 100%;
			position: absolute;
			top: 0;
			left: 0;
			z-index: -1;
		}
		.starting_menu
		{
			height: 100vh;
			width: 100%;
			position: absolute;
			top: 0;
			left: 0;
			background: #000;
			display: flex;
			justify-content: center;
			align-items: center;
			place-items: center;
		}
		button
		{
			font-family: Arial;
			padding: 5px 10px;
			outline: none;
		}
		.controls
		{
			height: 100px;
			width: 100%;
			background: transparent;
			display: flex;
			justify-content: space-around;
			padding: 0 10px;
			align-items: center;
			position: absolute;
			bottom: 0;
			left: 0;
			opacity: 40%;
		}
		.controls .leftRight
		{
			display: flex;
			gap: 10px;
		}
	</style>
</head>
<body>
	<div class="controls">
		<div class="leftRight">
			<button class="left">Left</button>
			<button class="right">Right</button>
		</div>
		<button class="shootButton">Shoot</button>
	</div>
	<div class="starting_menu">
		<div class="buttons">
			<button class="startButton">Start game</button>
		</div>
	</div>
	<canvas></canvas>
	<script type="text/javascript" src="main.js"></script>
</body>
</html>
